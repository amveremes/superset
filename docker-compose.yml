# -----------------------------------------------------------------------
# We don't support docker compose for production environments.
# If you choose to use this type of deployment make sure to
# create you own docker environment file (docker/.env) with your own
# unique random secure passwords and SECRET_KEY.
#
# For verbose logging during development:
# - Set SUPERSET_LOG_LEVEL=debug in docker/.env-local for detailed Superset logs
# -----------------------------------------------------------------------
x-superset-volumes:
  &superset-volumes # /app/pythonpath_docker will be appended to the PYTHONPATH in the final container
  - ./superset/config:/app/config
  - pythonpath:/app/pythonpath

x-common-build: &common-build
  context: .
  target: prod

services:
#  redis:
#    image: redis:7
#    container_name: superset_cache
#    restart: unless-stopped
#    volumes:
#      - redis:/data

#  db:
#    environment:
#      POSTGRES_DB: superset
#      POSTGRES_USER: superset
#      # Make sure you set this to a unique secure random value on production
#      POSTGRES_PASSWORD: superset
#    image: postgres:17
#    container_name: superset_db
#    restart: unless-stopped
#    volumes:
#      - db_home:/var/lib/postgresql/data
#      - ./docker/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d

  superset-init:
    container_name: superset_init
    build:
      <<: *common-build
    command: ["/app/docker/docker-init.sh"]
    environment:
      PYTHONPATH: "/app/pythonpath:/app/config"
      SUPERSET_CONFIG_PATH: /app/config/superset_config.py
    user: "root"
    volumes: *superset-volumes
    healthcheck:
      disable: true
#    depends_on:
#      db:
#        condition: service_started
#      redis:
#        condition: service_started

  superset-app:
    environment:
      PYTHONPATH: "/app/pythonpath:/app/config"
      SUPERSET_CONFIG_PATH: /app/config/superset_config.py
    build:
      <<: *common-build
    container_name: superset_app
    command: ["/app/docker/docker-bootstrap.sh", "app-gunicorn"]
    restart: unless-stopped
    ports:
      - 8088:8088
    depends_on:
      superset-init:
        condition: service_completed_successfully
    volumes: *superset-volumes

  superset-worker:
    build:
      <<: *common-build
    container_name: superset_worker
    command: ["/app/docker/docker-bootstrap.sh", "worker"]
    environment:
      PYTHONPATH: "/app/pythonpath:/app/config"
      SUPERSET_CONFIG_PATH: /app/config/superset_config.py
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    volumes: *superset-volumes
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A superset.tasks.celery_app:app inspect ping -d celery@$$HOSTNAME",
        ]

  superset-worker-beat:
    build:
      <<: *common-build
    container_name: superset_worker_beat
    command: ["/app/docker/docker-bootstrap.sh", "beat"]
    environment:
      PYTHONPATH: "/app/pythonpath:/app/config"
      SUPERSET_CONFIG_PATH: /app/config/superset_config.py
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
    volumes: *superset-volumes
    healthcheck:
      disable: true
  
  caddy:
    image: caddy:latest
    container_name: superset_caddy
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./caddy/config:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - superset-app
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  pythonpath:
  caddy_data:
  caddy_config:
#  db_home:
#  redis:
